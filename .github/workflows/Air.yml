name: airtel RKDYIPTV Playlist Update

permissions:
  contents: write

on:
  schedule:
    - cron: "1 0,6,12,18 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install Requests
        run: pip install requests

      - name: Create Folder
        run: mkdir -p Playlist/airtel.m3u

      - name: Generate index.html Playlist
        run: |
          import requests

          source="https://pvt-airtel.rkdyiptv.workers.dev/rkdyiptv.m3u8"
          logo="https://i.ibb.co/VWVcf4t5/RKDYIPTV.jpg"

          r=requests.get(source)
          lines=r.text.split("\n")

          playlist=[]
          playlist.append("#EXTM3U")
          playlist.append("# Credit: RKDYIPTV")

          for line in lines:
              if line.startswith("#EXTINF") and "tvg-logo" not in line:
                  line=line.replace("#EXTINF:-1",f'#EXTINF:-1 tvg-logo="{logo}"')
              playlist.append(line)

          html=f'''<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>RKDYIPTV</title>

<script>
window.location.href = "https://telegram.me/rkdyiptv";
</script>

</head>

<body>

<pre>
{"\n".join(playlist)}
</pre>

</body>
</html>
'''

          open("Playlist/airtel.m3u/index.html","w").write(html)
        shell: python

      - name: Commit Playlist
        run: |
          git config --global user.name "RKDYIPTV"
          git config --global user.email "rkdyiptv@users.noreply.github.com"
          git add Script/Playlist
          git commit -m "Auto Update $(date)" || echo "No changes"
          git push
