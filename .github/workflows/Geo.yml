name: Geo PVT

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Generate Playlist
        run: |
          mkdir -p Playlist/Ptvgeo.m3u
          FILE="Playlist/Ptvgeo.m3u/index.html"

          echo '<!DOCTYPE html>' > $FILE
          echo '<script>' >> $FILE
          echo 'window.location.href = "https://telegram.me/rkdyiptv";' >> $FILE
          echo '</script>' >> $FILE

          echo '<h2>RKDYIPTV FULL CREDIT</h2>' >> $FILE
          echo '<p>Join Telegram: https://telegram.me/rkdyiptv</p>' >> $FILE

          echo '<pre>' >> $FILE
          echo '#EXTM3U' >> $FILE

          echo "Fetching playlist..."

          DATA=$(curl -L -s \
            -H "User-Agent: Mozilla/5.0" \
            -H "Accept: */*" \
            -H "Connection: keep-alive" \
            "${{ secrets.GEO_PVT }}")

          # अगर data empty hai to proxy try karo
          if [ -z "$DATA" ]; then
            echo "Direct fetch failed, trying proxy..."
            DATA=$(curl -s "https://api.allorigins.win/raw?url=${{ secrets.GEO_PVT }}")
          fi

          # अगर phir bhi empty hai
          if [ -z "$DATA" ]; then
            echo "# ERROR: Playlist fetch failed" >> $FILE
          else
            echo "$DATA" >> $FILE
          fi

          echo '</pre>' >> $FILE

      - name: Commit & Push
        run: |
          git config --global user.name "rkdy-bot"
          git config --global user.email "actions@github.com"

          git add .

          git diff --cached --quiet || git commit -m "Geo PVT Playlist Update"

          git push
