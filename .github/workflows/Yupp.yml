name: yupptv RKDYIPTV Playlist Update

on:
  schedule:
    - cron: "1 0,6,12,18 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install Dependency
        run: pip install requests

      - name: Create Folder
        run: mkdir -p Script/Playlist/yupptv.m3u

      - name: Generate Playlist
        run: |
          import requests

          source = "https://pvt-airtel.rkdyiptv.workers.dev/rkdyiptv.m3u8"
          logo = "https://i.ibb.co/VWVcf4t5/RKDYIPTV.jpg"

          r = requests.get(source)
          lines = r.text.split("\n")

          playlist = []
          playlist.append("#EXTM3U")
          playlist.append("# Credit: RKDYIPTV")

          for line in lines:

              if line.startswith("#EXTINF") and "tvg-logo" not in line:
                  line = line.replace("#EXTINF:-1", f'#EXTINF:-1 tvg-logo="{logo}"')

              playlist.append(line)

          open("Script/Playlist/yupptv.m3u/playlist.m3u","w").write("\n".join(playlist))
        shell: python

      - name: Create Redirect Page
        run: |
          cat <<EOF > Script/Playlist/yupptv.m3u/index.html
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="UTF-8">
          <title>RKDYIPTV</title>

          <script>

          var ua = navigator.userAgent.toLowerCase();

          if(ua.includes("mozilla") || ua.includes("chrome") || ua.includes("safari")){
          window.location.href="https://t.me/rkdyiptv";
          }

          </script>

          </head>

          <body>
          <pre>
          #EXTM3U
          # Credit: RKDYIPTV
          </pre>
          </body>
          </html>
          EOF

      - name: Commit Playlist
        run: |
          git config --global user.name "RKDYIPTV"
          git config --global user.email "rkdyiptv@users.noreply.github.com"
          git add Script/Playlist
          git commit -m "Auto Update $(date)" || echo "No changes"
          git push
