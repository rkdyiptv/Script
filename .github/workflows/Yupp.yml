name: yupptv RKDYIPTV Playlist Update

on:
  schedule:
    - cron: "1 0,6,12,18 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install Dependency
        run: pip install requests

      - name: Generate Playlist
        run: |
          import requests

          source = "https://pvt-airtel.rkdyiptv.workers.dev/rkdyiptv.m3u8"
          logo = "https://i.ibb.co/VWVcf4t5/RKDYIPTV.jpg"

          r = requests.get(source)
          lines = r.text.split("\n")

          output = []
          output.append("#EXTM3U")
          output.append("# Credit: RKDYIPTV")
          output.append("# Auto Updated by GitHub Actions")

          for line in lines:

              if line.startswith("#EXTINF") and "tvg-logo" not in line:
                  line = line.replace("#EXTINF:-1", f'#EXTINF:-1 tvg-logo="{logo}"')

              output.append(line)

          with open("Script/Playlist/yupptv.m3u","w") as f:
              f.write("\n".join(output))
        shell: python

      - name: Commit Playlist
        run: |
          git config --global user.name "RKDYIPTV"
          git config --global user.email "rkdyiptv@users.noreply.github.com"
          git add Script/Playlist/yupptv.m3u
          git commit -m "Auto Update $(date)" || echo "No changes"
          git push
